name: frovy_app
description: "A new Flutter project with integrated ingredient analysis."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- FIREBASE ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # --- CAMERA & IMAGE ---
  camera: ^0.11.0+2
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2

  # --- NETWORKING ---
  http: ^1.2.2

  # --- STORAGE & PREFS ---
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # --- ENCRYPTION ---
  encrypt: ^5.0.3

  # --- LOCALISATION ---
  easy_localization: ^3.0.7
  intl: ^0.20.2

  # --- CHARTS ---
  fl_chart: ^0.69.0

  # --- URL LAUNCHER ---
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
