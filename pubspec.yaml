version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- TEAM CAMERA & IMAGE MODULES ---
  camera: ^0.11.0+2
