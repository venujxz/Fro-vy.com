name: frovy_app
description: "A new Flutter project with integrated ingredient analysis."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- TEAM CAMERA & IMAGE MODULES ---
  camera: ^0.11.0+2
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_image_compress: ^2.3.0
  image_picker: ^1.0.7

  # --- LOCALIZATION & STORAGE ---
  easy_localization: ^3.0.8
  google_mlkit_text_recognition: ^0.15.1
  shared_preferences: ^2.5.4
  intl: ^0.20.2

  # --- PAYMENT ---
  payhere_mobilesdk_flutter: ^3.2.2
  crypto: ^3.0.6
  url_launcher: ^6.3.1

  # --- FIREBASE ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # --- LOGIC & UI ---
  http: ^1.2.1
  google_generative_ai: ^0.4.7
  fl_chart: ^0.68.0

  # --- ENCRYPTION ---
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  remove_alpha_channel_ios: true
  background_color_ios: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo.png
    - assets/frovy_banner.png
    - assets/translations/