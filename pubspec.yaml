name: frovy_app
description: "A new Flutter project with integrated ingredient analysis."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- TEAM CAMERA & IMAGE MODULES ---
  camera: ^0.11.0+2
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_image_compress: ^2.3.0
  image_picker: ^1.0.7

  # --- LOCALIZATION & STORAGE ---
  easy_localization: ^3.0.8
  google_mlkit_text_recognition: ^0.15.1
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  payhere_mobilesdk_flutter: ^3.2.2
  crypto: ^3.0.6

  # --- YOUR FIREBASE MODULES ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # --- YOUR LOGIC & UI MODULES ---
  http: ^1.2.1
  google_generative_ai: ^0.4.7
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
